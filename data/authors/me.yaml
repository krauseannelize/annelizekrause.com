experience:
  - role: Data Analyst Intern
    org: Researchpreneurs (Masterschool internship placement), Remote
    start: 2026-05-01
    end: 2026-07-05
    summary: |
      * I was brought in to collect new data, but noticed my team's existing data was inconsistent across file formats and was never going to answer their questions. So I built Python pipelines to scrape, clean and structure all of it, tested end to end, into a single SQL database where questions could be answered with a query.
      * Past competitor analyses did not have a set structure I could replicate, so I researched the framework, built a custom Claude Code skill and dispatched agents to evaluate competitor websites on the same metrics. Any analyst after me can reuse the workflow for updated reports with fair, unbiased eyes.
  - role: Career Break (Relocation & Data Analytics Retraining)
    org: Germany
    start: 2019-02-01
    end: 2025-03-31
    summary: |
      * We moved to Germany in 2018, and my remote contracting wrapped up soon after. I learned German at the local VHS, completed the B1 integration course (2023), then retrained in data analytics: the Google Data Analytics certificate (2024), and full-time Masterschool training from April 2025.
  - role: Operations and Data Specialist
    org: Contractor · BigSpool Inc., Tilburg University researchers & others, Remote
    start: 2015-11-01
    end: 2019-01-31
    summary: |
      * BigSpool wanted to know if the inventory forecasting report they bought monthly was any good, so I built my own database and report to understand how it should work to make an informed call. Mine replaced the subscription completely, and I used it to manage $250K of inventory across 7 marketplaces and 5 brands.
      * Finance professors needed 300-year-old handwritten stock ledgers turned into data for research into the 1720 South Sea Bubble. Over 2 years I analysed ~18K photographs: delivering a standardised database of ~46K East India Company transactions with ~5K unique traders identified, then overhauling their Bank of England dataset with 20K+ transfer records and 11K+ unique traders identified.
  - role: Commercial Secretary, then Services Assistant
    org: ENSafrica (Africa's largest law firm), Johannesburg & Cape Town
    start: 2012-07-01
    end: 2015-09-30
    summary: |
      * A manual monthly expense allocation tied up 5+ team members for days, so I worked out the patterns they were searching for and automated the process. The workload dropped 90% and the numbers came out more accurate than the manual pass ever managed.
      * Access cards were going missing across 6 offices and nobody knew how many should be in inventory, so I built a database tracking ownership and loss patterns. Now we had a full accounting and could identify repeat offenders.
      * Contract-style due-diligence reports were not bringing in business, so I redesigned the format into a visual product a client would actually want to read and coordinated the practice groups' contributions. The new format went into the pitch that won the mandate to revise a mining conglomerate's entire contract suite in line with the new Companies Act.
  - role: Legal Secretary & Research Coordinator
    org: Various South African law firms & University of Pretoria, Gauteng
    start: 2001-09-01
    end: 2012-06-30
    summary: |
      * A senior advocate working on commission went into contract negotiations blind, so I tracked his time, calculated his commissions and reported per-client fees and rate trends. He walked into negotiations informed, and correcting past calculation mistakes put money straight back in his pocket.
      * I was handed a debt-collections department that hadn't been profitable in years, where interest ran on the *in duplum* rule: interest and costs may never exceed the outstanding capital. I studied the rule, built a spreadsheet that calculated it correctly, and defended my interpretation against senior attorneys, recovering money for clients and preventing endless debt for debtors. The department turned a profit within 6 months, and years later a court ruling confirmed my interpretation, with the rule itself codified into law.

